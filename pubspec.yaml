name: aprilcapstone
description: "CryptWhisper — Secure Offline Voice Biometric Vault"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Audio recording (WAV format, 16 kHz mono)
  record: ^6.2.0

  # HTTP client for talking to the local Python backend
  http: ^1.2.0

  # Provides temporary directory for saving WAV recordings
  path_provider: ^2.1.3

  # Persists enrollment flag across app restarts
  shared_preferences: ^2.3.2

  # Runtime microphone permission request on Android
  permission_handler: ^11.3.1
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
